services:
  postgres:
    image: postgres:15
    container_name: fitgpt_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fitgpt
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - fitgpt_postgres_data:/var/lib/postgresql/data

volumes:
  fitgpt_postgres_data:
